<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>采销工作台 - 会议平板ToB运营</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F0F1F5;--card:#FFFFFF;--text:#1B1F3B;--sub:#6B7280;--hint:#9CA3AF;--border:#E5E7EB;--accent:#534AB7;--danger:#DC2626;--warn:#D97706;--safe:#16A34A;--sidebar:250px;--topbar:56px}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
/* === SIDEBAR === */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:#1B1F3B;color:#fff;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand .brand-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-brand .brand-text{font-size:15px;font-weight:600;line-height:1.3}
.sidebar-brand .brand-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:400}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;transition:all .15s;font-size:14px;color:rgba(255,255,255,.65);margin-bottom:2px;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(83,74,183,.4)}
.nav-item .nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.nav-item .nav-badge{position:absolute;right:10px;background:var(--danger);color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3)}
/* === MAIN === */
.main{margin-left:var(--sidebar);height:100vh;display:flex;flex-direction:column;transition:margin .3s}
.topbar{height:var(--topbar);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:50}
.topbar .hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;border-radius:8px;color:var(--text);font-size:20px}
.topbar .hamburger:hover{background:#F3F4F6}
.topbar-title{font-size:16px;font-weight:600;flex:1}
.topbar-desc{font-size:12px;color:var(--hint)}
.content{flex:1;position:relative;overflow:hidden}
.content iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg)}
.content iframe.hidden{display:none}
/* === HOME DASHBOARD === */
.home{padding:24px;overflow-y:auto;height:100%;background:var(--bg)}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.home-card{background:#fff;border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.home-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);border-color:var(--accent)}
.home-card .hc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.home-card .hc-title{font-size:15px;font-weight:600;margin-bottom:4px}
.home-card .hc-desc{font-size:12px;color:var(--sub);line-height:1.5}
.home-card .hc-stats{display:flex;gap:12px;margin-top:12px;padding-top:10px;border-top:1px solid #F3F4F6}
.home-card .hc-stat{text-align:center;flex:1}
.home-card .hc-stat-num{font-size:18px;font-weight:700}
.home-card .hc-stat-label{font-size:10px;color:var(--hint)}
.home-welcome{margin-bottom:24px}
.home-welcome h1{font-size:24px;font-weight:700;margin-bottom:6px}
.home-welcome p{color:var(--sub);font-size:14px}
.quick-tip{background:linear-gradient(135deg,#534AB7,#7C3AED);color:#fff;border-radius:14px;padding:20px;margin-bottom:24px}
.quick-tip h3{font-size:15px;font-weight:600;margin-bottom:8px}
.quick-tip p{font-size:13px;opacity:.85;line-height:1.7}
/* === MOBILE === */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
  .sidebar-mask.show{display:block}
  .main{margin-left:0}
  .topbar .hamburger{display:flex}
  .home-grid{grid-template-columns:1fr}
  .mob-tabs{display:flex!important}
}
@media(min-width:769px){
  .mob-tabs{display:none!important}
}
.mob-tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:none;z-index:90;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 0;background:none;border:none;color:var(--hint);font-size:9px;cursor:pointer}
.mob-tab.active{color:var(--accent);font-weight:600}
.mob-tab .mt-icon{font-size:18px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;

const TOOLS=[
  {id:'home',icon:'🏠',label:'工作台',desc:'总览仪表盘',file:null},
  {id:'price',icon:'📡',label:'价格雷达',desc:'多平台价格监控与预警',file:'tool-price-radar.html',color:'#E4393C',bg:'#FEF2F2'},
  {id:'inv',icon:'📦',label:'库存水位',desc:'分仓库存预警与跨仓调拨',file:'tool-inventory.html',color:'#2563EB',bg:'#EFF6FF'},
  {id:'pdp',icon:'🔍',label:'商详巡检',desc:'商品详情页质量巡检',file:'tool-pdp.html',color:'#7C3AED',bg:'#F5F3FF'},
  {id:'complaint',icon:'🛡️',label:'客诉雷达',desc:'客户投诉追踪与SLA管理',file:'tool-complaint.html',color:'#D97706',bg:'#FFFBEB'},
  {id:'scenario',icon:'💼',label:'场景方案',desc:'ToB解决方案生成与报价',file:'tool-scenario.html',color:'#059669',bg:'#ECFDF5'},
  {id:'calendar',icon:'📅',label:'活动排期',desc:'促销日历与任务节点管理',file:'tool-calendar.html',color:'#E4393C',bg:'#FEF2F2'},
];

// Read stats from each tool's localStorage
function getStats(){
  const s={price:{},inv:{},pdp:{},complaint:{},scenario:{}};
  try{
    // Price Radar
    const pr=JSON.parse(localStorage.getItem('price-radar-v11')||'null');
    if(pr?.dates?.length){const d=pr.dates.find(x=>x.id===pr.currentDate);s.price.dates=pr.dates.length;s.price.skus=d?.groups?.length||0;
      let alerts=0;d?.groups?.forEach(g=>{if(!g.alertOn)return;const jd=g.items?.find(i=>i.isBench);if(!jd)return;const jdP=Math.min(...(jd.priceEntries||[]).map(e=>Math.max(0,e.price-(e.discount||0))).filter(x=>x>0));g.items?.filter(i=>!i.isBench).forEach(i=>{const bp=Math.min(...(i.priceEntries||[]).map(e=>Math.max(0,e.price-(e.discount||0))).filter(x=>x>0));if(bp<jdP)alerts++;});});s.price.alerts=alerts;}
  }catch{}
  try{
    // Inventory
    const iv=JSON.parse(localStorage.getItem('inv-alert-v17')||'null');
    if(iv?.dates?.length){const d=iv.dates.find(x=>x.id===iv.currentDate);const skus=d?.skus||[];s.inv.skus=skus.length;let danger=0,warn=0;
      skus.forEach(sk=>{let worst='safe';sk.warehouses?.forEach(w=>{const ed=w.dailySales;const safe=ed*(w.leadTime+w.buffer);const av=w.stock-(w.allocated||0);if(av<=0||av<safe*.5)worst='danger';else if(av<safe&&worst==='safe')worst='warn';});if(worst==='danger')danger++;else if(worst==='warn')warn++;});s.inv.danger=danger;s.inv.warn=warn;}
  }catch{}
  try{
    // Complaint
    const cp=JSON.parse(localStorage.getItem('complaint-v10')||'null');
    if(cp?.complaints){s.complaint.total=cp.complaints.length;s.complaint.open=cp.complaints.filter(c=>c.status==='pending'||c.status==='processing').length;}
  }catch{}
  try{
    // PDP
    const pd=JSON.parse(localStorage.getItem('pdp-check-v8')||'null');
    if(pd?.skus){s.pdp.skus=pd.skus.length;let issues=0;pd.skus.forEach(sk=>{(sk.records||[]).forEach(r=>{(r.issues||[]).forEach(is=>{if(!is.resolved)issues++;});});});s.pdp.issues=issues;}
  }catch{}
  try{
    const sc=JSON.parse(localStorage.getItem('scene-solution-skus')||'null');
    if(sc)s.scenario.skus=sc.length;
  }catch{}
  try{
    const cal=JSON.parse(localStorage.getItem('act-calendar-v1')||'null');
    if(cal?.acts){s.calendar={total:cal.acts.length,urgent:0};
      const td=new Date().toISOString().slice(0,10);
      cal.acts.forEach(a=>{const pending=a.tasks?.filter(t=>!t.done&&t.dueDate)||[];pending.forEach(t=>{const d=Math.ceil((new Date(t.dueDate)-new Date(td))/864e5);if(d>=0&&d<=3)s.calendar.urgent++;});});}
  }catch{}
  return s;
}

function App(){
  const [active,setActive]=useState('home');
  const [sideOpen,setSideOpen]=useState(false);
  const [stats,setStats]=useState(getStats);
  const [loaded,setLoaded]=useState({});

  // Refresh stats when switching to home
  useEffect(()=>{if(active==='home')setStats(getStats());},[active]);

  const go=useCallback((id)=>{
    setActive(id);setSideOpen(false);
    if(id!=='home')setLoaded(p=>({...p,[id]:true}));
  },[]);

  const tool=TOOLS.find(t=>t.id===active);

  // Get time-based greeting
  const hour=new Date().getHours();
  const greeting=hour<6?'夜深了':hour<9?'早上好':hour<12?'上午好':hour<14?'中午好':hour<18?'下午好':'晚上好';

  // Daily tips
  const tips=[
    '每天早晨先检查价格雷达的预警，再看库存水位的紧急SKU，最后处理客诉工单。',
    '补货周期 = 品牌方从接到你的需求到货物入京东仓的天数，不同品牌不一样，多问多记。',
    '商详页巡检建议每周做一次，大促前加做一次突击检查。',
    '遇到竞品降价先标注性质（临时促销/长期调价），不同性质应对策略完全不同。',
    '大客户订单（10台+）务必提前和销售团队建立沟通机制，别等下单了才知道。',
    '库存水位的日均销量用近7天均值，别只看昨天——ToB单日波动非常大。',
  ];
  const todayTip=tips[new Date().getDate()%tips.length];

  return(<>
    {/* Sidebar */}
    <div className={`sidebar ${sideOpen?'open':''}`}>
      <div className="sidebar-brand">
        <div className="brand-icon">🎯</div>
        <div><div className="brand-text">采销工作台</div><div className="brand-sub">会议平板ToB · 3C数码</div></div>
      </div>
      <div className="sidebar-nav">
        <div className="nav-label">导航</div>
        {TOOLS.map(t=>{
          const badge=t.id==='price'&&stats.price.alerts>0?stats.price.alerts:
            t.id==='inv'&&stats.inv.danger>0?stats.inv.danger:
            t.id==='complaint'&&stats.complaint.open>0?stats.complaint.open:
            t.id==='calendar'&&stats.calendar?.urgent>0?stats.calendar.urgent:null;
          return<div key={t.id} className={`nav-item ${active===t.id?'active':''}`} onClick={()=>go(t.id)}>
            <span className="nav-icon">{t.icon}</span>{t.label}
            {badge>0&&<span className="nav-badge">{badge}</span>}
          </div>;
        })}
      </div>
      <div className="sidebar-footer">京东采销运营工具 v1.0</div>
    </div>
    {sideOpen&&<div className="sidebar-mask show" onClick={()=>setSideOpen(false)}/>}

    {/* Main */}
    <div className="main">
      <div className="topbar">
        <button className="hamburger" onClick={()=>setSideOpen(true)}>☰</button>
        <div className="topbar-title">{tool?.icon} {tool?.label||'工作台'}</div>
        <div className="topbar-desc">{tool?.desc}</div>
      </div>
      <div className="content">
        {/* Home Dashboard */}
        {active==='home'&&<div className="home">
          <div className="home-welcome"><h1>{greeting}，采销新人 👋</h1><p>今天也要元气满满地盯数据！</p></div>

          <div className="quick-tip"><h3>💡 今日提醒</h3><p>{todayTip}</p></div>

          <div style={{fontSize:14,fontWeight:600,marginBottom:12,color:'var(--sub)'}}>📊 各模块概览（点击进入）</div>
          <div className="home-grid">
            <div className="home-card" onClick={()=>go('price')}>
              <div className="hc-icon" style={{background:'#FEF2F2',color:'#E4393C'}}>📡</div>
              <div className="hc-title">价格雷达</div>
              <div className="hc-desc">多平台价格监控，竞品降价预警</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.price.skus||0}</div><div className="hc-stat-label">监控中</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:stats.price.alerts>0?'var(--danger)':'var(--safe)'}}>{stats.price.alerts||0}</div><div className="hc-stat-label">预警</div></div>
                <div className="hc-stat"><div className="hc-stat-num">{stats.price.dates||0}</div><div className="hc-stat-label">日期页</div></div>
              </div>
            </div>

            <div className="home-card" onClick={()=>go('inv')}>
              <div className="hc-icon" style={{background:'#EFF6FF',color:'#2563EB'}}>📦</div>
              <div className="hc-title">库存水位</div>
              <div className="hc-desc">分仓预警，跨仓调拨，大促备货</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.inv.skus||0}</div><div className="hc-stat-label">SKU</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:'var(--danger)'}}>{stats.inv.danger||0}</div><div className="hc-stat-label">紧急</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:'var(--warn)'}}>{stats.inv.warn||0}</div><div className="hc-stat-label">偏低</div></div>
              </div>
            </div>

            <div className="home-card" onClick={()=>go('pdp')}>
              <div className="hc-icon" style={{background:'#F5F3FF',color:'#7C3AED'}}>🔍</div>
              <div className="hc-title">商详巡检</div>
              <div className="hc-desc">商品详情页质量检查与问题追踪</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.pdp.skus||0}</div><div className="hc-stat-label">SKU</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:stats.pdp.issues>0?'var(--warn)':'var(--safe)'}}>{stats.pdp.issues||0}</div><div className="hc-stat-label">待修问题</div></div>
              </div>
            </div>

            <div className="home-card" onClick={()=>go('complaint')}>
              <div className="hc-icon" style={{background:'#FFFBEB',color:'#D97706'}}>🛡️</div>
              <div className="hc-title">客诉雷达</div>
              <div className="hc-desc">客户投诉处理与SLA监控</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.complaint.total||0}</div><div className="hc-stat-label">总工单</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:stats.complaint.open>0?'var(--danger)':'var(--safe)'}}>{stats.complaint.open||0}</div><div className="hc-stat-label">待处理</div></div>
              </div>
            </div>

            <div className="home-card" onClick={()=>go('scenario')}>
              <div className="hc-icon" style={{background:'#ECFDF5',color:'#059669'}}>💼</div>
              <div className="hc-title">场景方案</div>
              <div className="hc-desc">ToB解决方案配置与报价生成</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.scenario.skus||0}</div><div className="hc-stat-label">SKU库</div></div>
              </div>
            </div>

            <div className="home-card" onClick={()=>go('calendar')}>
              <div className="hc-icon" style={{background:'#FEF2F2',color:'#E4393C'}}>📅</div>
              <div className="hc-title">活动排期</div>
              <div className="hc-desc">促销日历、任务节点、活动复盘</div>
              <div className="hc-stats">
                <div className="hc-stat"><div className="hc-stat-num">{stats.calendar?.total||0}</div><div className="hc-stat-label">活动</div></div>
                <div className="hc-stat"><div className="hc-stat-num" style={{color:stats.calendar?.urgent>0?'var(--danger)':'var(--safe)'}}>{stats.calendar?.urgent||0}</div><div className="hc-stat-label">即将截止</div></div>
              </div>
            </div>
          </div>

          <div style={{background:'#fff',borderRadius:14,padding:20,marginTop:8,boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>📅 每日工作流（建议）</div>
            <div style={{fontSize:13,color:'var(--sub)',lineHeight:2}}>
              <div>1️⃣ <b>08:30</b> — 打开<span style={{color:'#E4393C',cursor:'pointer'}} onClick={()=>go('price')}>「价格雷达」</span>创建今日日期页，录入各平台价格</div>
              <div>2️⃣ <b>09:00</b> — 打开<span style={{color:'#2563EB',cursor:'pointer'}} onClick={()=>go('inv')}>「库存水位」</span>创建今日日期页，更新各仓库存</div>
              <div>3️⃣ <b>09:30</b> — 处理<span style={{color:'#D97706',cursor:'pointer'}} onClick={()=>go('complaint')}>「客诉雷达」</span>中超时和新增工单</div>
              <div>4️⃣ <b>10:00</b> — 按预警结果联系品牌方补货/调价</div>
              <div>5️⃣ <b>每周一</b> — 做一次<span style={{color:'#7C3AED',cursor:'pointer'}} onClick={()=>go('pdp')}>「商详巡检」</span></div>
              <div>6️⃣ <b>有客户需求时</b> — 用<span style={{color:'#059669',cursor:'pointer'}} onClick={()=>go('scenario')}>「场景方案」</span>快速生成报价</div>
              <div>📅 <b>每周一</b> — 打开<span style={{color:'#E4393C',cursor:'pointer'}} onClick={()=>go('calendar')}>「活动排期」</span>检查本周有无deadline</div>
            </div>
          </div>
        </div>}

        {/* Tool iframes - lazy load, keep alive */}
        {TOOLS.filter(t=>t.file).map(t=>
          (loaded[t.id]||active===t.id)&&<iframe key={t.id} src={t.file} className={active===t.id?'':'hidden'}
            onLoad={()=>setLoaded(p=>({...p,[t.id]:true}))}/>
        )}
      </div>
    </div>


  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
